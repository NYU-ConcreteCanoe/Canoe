# =============================================================================
# NYU Concrete Canoe - admin panel configuration (Sveltia CMS)
#
# Editors sign in with GitHub at /admin/ and every save becomes a commit,
# which GitHub Pages rebuilds automatically. There is no server to run.
#
# BEFORE THIS WORKS, two values below must be filled in. See admin/README.md.
# =============================================================================

backend:
  name: github
  repo: nyu-concretecanoe/Canoe
  branch: main

# Every save opens a pull request instead of committing to main directly.
#
# Editors see a Workflow board with Draft / In Review / Ready columns. Moving
# an entry to "In Review" pushes a branch named cms/<collection>/<slug> and
# opens a PR. Nothing reaches the live site until someone with merge rights
# merges that PR, so a non-technical editor can never break the site.
publish_mode: editorial_workflow

# Default drop target for images that are not tied to a specific year.
media_folder: assets/img/uploads
public_folder: assets/img/uploads

# Image handling.
# Phone photos are 2-8 MB. Sveltia resizes and converts to WebP.
media_libraries:
  default:
    config:
      max_file_size: 8000000 # reject anything above 8 MB outright
      transformations:
        raster_image:
          format: webp
          quality: 82
          width: 2000
          height: 2000

collections:
  # Front page bulletin board. This is the one most people will use.
  - name: announcements
    label: Announcements
    icon: campaign
    files:
      - name: announcements
        label: Front Page Announcements
        file: assets/data/announcements.json
        description: >-
          Posts shown on the home page. Newest first. Pinned posts always
          appear at the top.
        fields:
          - name: settings
            label: Display Settings
            widget: object
            collapsed: true
            fields:
              - {
                  name: heading,
                  label: Section heading,
                  widget: string,
                  default: Latest News,
                }
              - {
                  name: maxVisible,
                  label: How many posts to show,
                  widget: number,
                  value_type: int,
                  min: 1,
                  max: 12,
                  default: 3,
                }
          - name: announcements
            label: Posts
            label_singular: Post
            widget: list
            summary: "{{fields.date}} - {{fields.title}}"
            fields:
              - {
                  name: id,
                  label: Internal ID,
                  widget: string,
                  hint: "Lowercase, no spaces. Used only internally, e.g. spring-2027-recruiting",
                }
              - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", time_format: false }
              - name: category
                label: Category
                widget: select
                options: [news, competition, recruitment]
                default: news
              - { name: title, label: Title, widget: string }
              - {
                  name: body,
                  label: Body,
                  widget: text,
                  hint: "Two or three sentences. Plain text only.",
                }
              - name: link
                label: Button link
                widget: object
                required: false
                collapsed: true
                fields:
                  - { name: text, label: Button text, widget: string, required: false }
                  - {
                      name: url,
                      label: URL,
                      widget: string,
                      required: false,
                      hint: "Another page (contact.html) or a full https:// link",
                    }
              - {
                  name: image,
                  label: Image,
                  widget: image,
                  required: false,
                  hint: "Optional. Shown above the text.",
                }
              - name: sections
                label: Grouped lists
                label_singular: List
                widget: list
                required: false
                collapsed: true
                summary: "{{fields.heading}}"
                hint: "Optional. Use for things like competition placements."
                fields:
                  - { name: heading, label: Heading, widget: string, hint: "e.g. Nationals" }
                  - { name: items, label: Items, widget: list }
              - {
                  name: embed,
                  label: Embed a post or video,
                  widget: string,
                  required: false,
                  hint: "Optional. Paste a LinkedIn, Instagram or YouTube link and the post plays here instead of the text. Nothing else is allowed.",
                }
              - {
                  name: pinned,
                  label: Pin to top,
                  widget: boolean,
                  default: false,
                  required: false,
                }

  # Canoe history. Images live under assets/img/canoes/<year>/.
  - name: canoes
    label: Canoe Timeline
    icon: sailing
    files:
      - name: canoes
        label: Canoe History
        file: assets/data/canoes.json
        media_folder: /assets/img/canoes
        public_folder: assets/img/canoes
        description: >-
          One entry per canoe, newest first. When adding photos, upload them
          into the folder for that canoe's year.
        fields:
          - name: canoes
            label: Canoes
            label_singular: Canoe
            widget: list
            summary: "{{fields.year}} - {{fields.name}}"
            fields:
              - { name: year, label: Year, widget: number, value_type: int }
              - { name: name, label: Canoe name, widget: string }
              - {
                  name: description,
                  label: Description,
                  widget: text,
                  hint: "Basic HTML such as <strong> is allowed here.",
                }
              - { name: tags, label: Tags, widget: list }
              - name: images
                label: Photos
                widget: list
                required: false
                field: { name: image, label: Photo, widget: image }

  # Student leadership shown on the About page.
  - name: team
    label: Team Roster
    icon: group
    files:
      - name: team
        label: Team Roster
        file: assets/data/team.json
        media_folder: /assets/img/headshots
        public_folder: assets/img/headshots
        fields:
          - name: leadership
            label: Leadership
            label_singular: Member
            widget: list
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string }
              - {
                  name: image,
                  label: Headshot,
                  widget: image,
                  required: false,
                  hint: "Leave empty to use the placeholder image.",
                }
          - name: members
            label: Members
            label_singular: Member
            widget: list
            required: false
            fields:
              - { name: name, label: Name, widget: string }
              - { name: role, label: Role, widget: string, required: false }
              - { name: image, label: Headshot, widget: image, required: false }
