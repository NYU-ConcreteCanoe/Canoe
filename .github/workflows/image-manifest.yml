name: Rebuild image manifest and derivatives

# Static hosting has no directory listing, so the browser cannot discover which
# photos exist in assets/img/canoes/<year>/. This job scans the folders on every
# push and writes the result to assets/data/images.json, which the timeline and
# the background slideshow both read.
#
# It also builds light WebP copies of each photo under assets/img/derived/. The
# originals are full-resolution camera files (200+ MB total); the pages load the
# small copies so the site is quick, and fall back to the original if a copy is
# missing. Both outputs are committed back here.
#
# Practical effect: adding photos means adding files. Nobody edits JSON or resizes
# anything by hand.

on:
  push:
    branches: [main]
    paths:
      - "assets/img/**"
      - ".github/workflows/image-manifest.yml"
      - "scripts/build-image-manifest.mjs"
      - "scripts/build-image-derivatives.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build image derivatives
        run: node scripts/build-image-derivatives.mjs

      - name: Build manifest
        run: node scripts/build-image-manifest.mjs

      - name: Commit if changed
        run: |
          git add assets/img/derived assets/data/images.json
          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: rebuild image manifest and derivatives [skip ci]"
          git push
