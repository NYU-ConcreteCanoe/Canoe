<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="NYU Concrete Canoe Team">
    <meta name="designer" content="Aunirbhan Das">
    <meta name="developer" content="Aunirbhan Das">
    <meta name="description" content="Contact the NYU Concrete Canoe team.">
    <title>Contact | NYU Concrete Canoe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="page-other">

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a href="index.html" class="navbar-brand"><img src="assets/img/headerLogo.png" alt="NYU Concrete Canoe Logo">NYU Concrete Canoe</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="timeline.html">Timeline</a></li>
                    <li class="nav-item"><a class="nav-link" href="paddling-improvement.html">PIS System</a></li>
                    <li class="nav-item"><a class="nav-link" href="sponsors.html">Sponsors</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <!-- Intro -->
        <section class="hero">
            <h1>Contact Us</h1>
            <p>Have questions or want to collaborate? Reach out to our team below.</p>
        </section>

        <!-- Parallax Content Screen -->
        <div class="parallax-section">
            <div class="content-wrapper">
                <!-- Contact Form -->
                <section style="max-width: 600px; margin: 4rem auto 0;">
                    <div class="card">
                        <form id="contactForm" style="text-align: left;">
                            <div style="margin-bottom: 1.5rem;">
                                <label
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Full
                                    Name</label>
                                <input type="text" id="contactName" placeholder="Your Name" required
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white;">
                            </div>

                            <div style="margin-bottom: 1.5rem;">
                                <label
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Email
                                    Address</label>
                                <input type="email" id="contactEmail" placeholder="you@example.com" required
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white;">
                            </div>

                            <div style="margin-bottom: 2rem;">
                                <label
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Message</label>
                                <textarea id="contactMessage" rows="5" placeholder="How can we help?" required
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; resize: vertical;"></textarea>
                            </div>

                            <button type="submit" class="btn" style="width: 100%; background: white; color: black;">
                                Send Message
                            </button>
                        </form>

                        <script>
                            document.getElementById('contactForm').addEventListener('submit', function (e) {
                                e.preventDefault();
                                var name = document.getElementById('contactName').value.trim();
                                var email = document.getElementById('contactEmail').value.trim();
                                var message = document.getElementById('contactMessage').value.trim();
                                var subject = 'NYU Concrete Canoe - Message from ' + name;
                                var body = 'From: ' + name + ' (' + email + ')\n\n' + message;
                                window.location.href = 'mailto:nyuconcretecanoe@gmail.com'
                                    + '?subject=' + encodeURIComponent(subject)
                                    + '&body=' + encodeURIComponent(body)
                                    + '&cc=' + encodeURIComponent(email);
                            });
                        </script>

                        <div style="display: flex; gap: 1.5rem; justify-content: center; margin-top: 3rem;">
                            <a href="https://www.instagram.com/nyuconcretecanoe/" target="_blank" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa fa-instagram"></i>
                            </a>
                            <a href="mailto:nyuconcretecanoe@gmail.com" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa fa-envelope"></i>
                            </a>
                            <a href="assets/files/sponsorship.pdf" target="_blank" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa fa-heart"></i>
                            </a>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 NYU Concrete Canoe | NYU Tandon School of Engineering</p>
    </footer>

    <script src="assets/js/background.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
