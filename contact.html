<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contact the NYU Concrete Canoe team.">
    <title>Contact | NYU Concrete Canoe</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body class="page-other">

    <!-- Navigation -->
    <nav>
        <div class="container">
            <a href="index.html" class="nav-brand">NYU Concrete Canoe</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="timeline.html">Timeline</a></li>
                <li><a href="sponsors.html">Sponsors</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <!-- Intro -->
        <section class="hero">
            <h1>Contact Us</h1>
            <p>Have questions or want to collaborate? Reach out to our team below.</p>
        </section>

        <!-- Parallax Content Screen -->
        <div class="parallax-section">
            <div class="content-wrapper">
                <!-- Contact Form -->
                <section style="max-width: 600px; margin: 4rem auto 0;">
                    <div class="card">
                        <!-- FORM FUNCTIONALITY: 
                             To make this send to nyuconcretecanoe@gmail.com:
                             1. Go to Formspree.io and create a free account.
                             2. Create a new form and copy the unique ID.
                             3. Replace 'yourFormID' below with that ID. 
                        -->
                        <form action="https://formspree.io/f/yourFormID" method="POST" style="text-align: left;">
                            <div style="margin-bottom: 1.5rem;">
                                <label
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Full
                                    Name</label>
                                <input type="text" name="name" placeholder="Your Name" required
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white;">
                            </div>

                            <div style="margin-bottom: 1.5rem;">
                                <label
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Email
                                    Address</label>
                                <input type="email" name="email" placeholder="you@example.com" required
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white;">
                            </div>

                            <div style="margin-bottom: 2rem;">
                                <label
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Message</label>
                                <textarea name="message" rows="5" placeholder="How can we help?" required
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; resize: vertical;"></textarea>
                            </div>

                            <button type="submit" class="btn" style="width: 100%; background: white; color: black;">
                                Send Message
                            </button>
                        </form>

                        <div style="display: flex; gap: 1.5rem; justify-content: center; margin-top: 3rem;">
                            <a href="https://www.instagram.com/nyuconcretecanoe/" target="_blank" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa fa-instagram"></i>
                            </a>
                            <a href="mailto:nyuconcretecanoe@gmail.com" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa fa-envelope"></i>
                            </a>
                            <a href="assets/files/sponsorship.pdf.zip" target="_blank" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                                <i class="fa fa-heart"></i>
                            </a>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 NYU Concrete Canoe | NYU Tandon School of Engineering</p>
    </footer>

</body>

</html>
