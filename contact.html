    <main id="main">
        <!-- Intro -->
        <section class="hero">
            <h1>Contact Us</h1>
            <p>Have questions or want to collaborate? Reach out to our team below.</p>
        </section>

        <!-- Parallax Content Screen -->
        <div class="parallax-section">
            <div class="content-wrapper">
                <!-- Contact Form -->
                <section style="max-width: 600px; margin: 4rem auto 0;">
                    <div class="card">
                        <!--
                          Submissions go to Web3Forms, which emails them to the
                          team address. The plain action/method below means the
                          form still works if JavaScript fails; the script at the
                          bottom only upgrades it to submit without a page reload.

                          SETUP: replace the access_key value. Get a free key at
                          https://web3forms.com by entering the team email; there
                          is no account or password to hand over between officers.
                          See CONTACT-FORM.md for the required Gmail filter.
                        -->
                        <form id="contactForm" style="text-align: left;" action="https://api.web3forms.com/submit"
                            method="POST">

                            <input type="hidden" name="access_key" value="REPLACE-WITH-WEB3FORMS-ACCESS-KEY">
                            <input type="hidden" name="subject" value="New message from the Concrete Canoe website">
                            <input type="hidden" name="from_name" value="NYU Concrete Canoe Website">

                            <!-- Honeypot: hidden from people, filled in by bots. -->
                            <input type="checkbox" name="botcheck" class="hidden" style="display: none;"
                                tabindex="-1" autocomplete="off" aria-hidden="true">

                            <div style="margin-bottom: 1.5rem;">
                                <label for="contactName"
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Full
                                    Name</label>
                                <input type="text" id="contactName" name="name" placeholder="Your Name" required autocomplete="name"
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white;">
                            </div>

                            <div style="margin-bottom: 1.5rem;">
                                <label for="contactEmail"
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Email
                                    Address</label>
                                <input type="email" id="contactEmail" name="email" placeholder="you@example.com" required autocomplete="email"
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white;">
                            </div>

                            <div style="margin-bottom: 2rem;">
                                <label for="contactMessage"
                                    style="display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.9rem;">Message</label>
                                <textarea id="contactMessage" name="message" rows="5" placeholder="How can we help?" required
                                    style="width: 100%; padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; resize: vertical;"></textarea>
                            </div>

                            <button type="submit" id="contactSubmit" class="btn"
                                style="width: 100%; background: white; color: black;">
                                Send Message
                            </button>

                            <!-- role=status announces the result to screen readers
                                 without a page reload. Focus is moved here too,
                                 since live regions alone are unreliable. -->
                            <p id="contactStatus" class="form-status" role="status" aria-live="polite"
                                tabindex="-1" hidden></p>
                        </form>


                        <div style="display: flex; gap: 1.5rem; justify-content: center; margin-top: 3rem;">
                            <a href="https://www.instagram.com/nyuconcretecanoe/" target="_blank" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;" aria-label="Instagram">
                                <i class="fa fa-instagram"></i>
                            </a>
                            <a href="mailto:nyuconcretecanoe@gmail.com" class="btn"
                                style="border-radius: 50%; width: 50px; height: 50px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;" aria-label="Email us">
                                <i class="fa fa-envelope"></i>
                            </a>
                            <a href="assets/files/sponsorship.pdf" target="_blank" class="btn"

                                <i class="fa fa-heart"></i>
                            </a>
                        </div>
